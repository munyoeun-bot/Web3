<!DOCTYPE html>
<html lang="km">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hero 1920x500</title>

<link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Kantumruy Pro', sans-serif;
}

/* HERO */
.hero{
  width:100%;
  height:500px;   /* 1920 x 500 */
  position:relative;
  overflow:hidden;
}

/* IMAGE */
.hero img{
  width:100%;
  height:100%;
  object-fit:cover;
  position:absolute;
  top:0;
  left:0;
}

/* OVERLAY */
.hero::after{
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.45);
}

/* CONTENT */
.hero-content{
  position:relative;
  z-index:2;
  height:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:white;
  padding:0 20px;
  animation:fadeUp 1s ease;
}

.hero-content h1{
  font-size:42px;
  margin-bottom:12px;
}

.hero-content p{
  font-size:16px;
  max-width:650px;
  line-height:1.6;
  margin-bottom:18px;
}

/* BUTTON */
.hero-content button{
  padding:12px 24px;
  border:none;
  border-radius:8px;
  background:#16a34a;
  color:white;
  font-size:15px;
  cursor:pointer;
  transition:0.3s;
}

.hero-content button:hover{
  background:#22c55e;
  transform:translateY(-3px);
}

/* ANIMATION */
@keyframes fadeUp{
  from{
    opacity:0;
    transform:translateY(25px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* RESPONSIVE */
@media(max-width:768px){
  .hero{
    height:350px;
  }

  .hero-content h1{
    font-size:24px;
  }

  .hero-content p{
    font-size:13px;
  }
}

</style>
</head>

<body>

<!-- HERO -->
<section class="hero">

  <img src="https://images.unsplash.com/photo-1523240795612-9a054b0db644">

  <div class="hero-content">
    <h1>សាលាអប់រំទំនើប</h1>
    <p>
      យើងផ្តល់ការអប់រំគុណភាពខ្ពស់ ដើម្បីអភិវឌ្ឍសិស្សឲ្យមានចំណេះដឹង និងជំនាញសម្រាប់អនាគត។
    </p>
    <button>ស្វែងយល់បន្ថែម</button>
  </div>

</section>

</body>
</html>
